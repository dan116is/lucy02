<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#0b1220">
<title>המשחקים של גפן 🎮</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{font-family:-apple-system,"Segoe UI","Heebo",Arial,sans-serif;
  background:radial-gradient(1000px 700px at 80% -10%,#1a2c4f,#0b1220 60%),#0b1220;
  color:#eaf1ff;display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100dvh;min-height:100vh;padding:24px;gap:20px}
h1{font-size:30px;margin:0;text-align:center;
  background:linear-gradient(90deg,#3ea6ff,#7c5cff);-webkit-background-clip:text;background-clip:text;color:transparent}
p.sub{margin:0;color:#9fb3d4;text-align:center}
.cards{display:grid;gap:16px;width:100%;max-width:440px;margin-top:8px}
a.card{display:flex;align-items:center;gap:16px;padding:20px;border-radius:22px;text-decoration:none;color:#eaf1ff;
  border:1px solid rgba(255,255,255,.1);box-shadow:0 10px 30px rgba(0,0,0,.35);transition:transform .12s}
a.card:active{transform:scale(.97)}
a.card.quiz{background:linear-gradient(135deg,#1c2f50,#15233e)}
a.card.sand{background:linear-gradient(135deg,#2a6fa0,#3f8fc0)}
.ico{font-size:42px;flex:none}
.tx b{display:block;font-size:20px;margin-bottom:2px}
.tx span{color:#cfe0f7;font-size:14px}
footer{color:#6f86ad;font-size:12px;margin-top:6px}
</style>
</head>
<body>
  <h1>המשחקים של גפן 🎮</h1>
  <p class="sub">בחרו משחק</p>
  <div class="cards">
    <a class="card quiz" href="./quiz-game/">
      <div class="ico">🎖️</div>
      <div class="tx"><b>אלוף הידע</b><span>טריוויה, מבחני סימולציה ולמידה · 4000+ שאלות</span></div>
    </a>
    <a class="card sand" href="./sandbox-game/">
      <div class="ico">🚜</div>
      <div class="tx"><b>ארגז החול של גפן</b><span>משחק חופשי עם חול, כלים וצלילים</span></div>
    </a>
  </div>
  <footer>נשמר במכשיר בלבד · עובד גם לא־מקוון</footer>
</body>
</html>
