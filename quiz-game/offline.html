<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1220" />
  <title>אין חיבור — אלוף הידע</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
    }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: #0b1220;
      color: #eaf1ff;
      font-family: -apple-system, "Heebo", Arial, sans-serif;
      text-align: center;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      max-width: 420px;
      width: 100%;
    }
    .icon {
      font-size: 56px;
      line-height: 1;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 26px;
      font-weight: 700;
      margin: 0 0 12px;
    }
    p {
      font-size: 16px;
      line-height: 1.6;
      opacity: 0.8;
      margin: 0 0 28px;
    }
    button {
      font: inherit;
      font-size: 17px;
      font-weight: 600;
      color: #0b1220;
      background: #eaf1ff;
      border: none;
      border-radius: 12px;
      padding: 14px 28px;
      cursor: pointer;
      transition: opacity 0.15s ease;
    }
    button:hover { opacity: 0.9; }
    button:active { opacity: 0.75; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon" aria-hidden="true">📡</div>
    <h1>אין חיבור לאינטרנט</h1>
    <p>המשחק יעבוד שוב כשהחיבור יחזור — נסה לרענן.</p>
    <button type="button" onclick="location.reload()">נסה שוב</button>
  </div>
</body>
</html>
